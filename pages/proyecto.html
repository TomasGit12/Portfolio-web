<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Enlace al CSS de Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- Enlace para el archivo Css -->
    <link rel="stylesheet" href="../css/styles.css">

    <title>Proyectos-personales</title>
</head>
<body>

    <div class="contenedor-principal">

        <!-- Encabezado del sitio -->
        <header class="header">
            <div class="barra">
                <p class="nombre">Tomas Mercado</p>
                    <!-- Barra de navegacion -->
                    <nav>
                        <ul class="menu">
                            <!-- enlaces de la pagina -->
                            <li><a href="../index.html" class="btn-custom">inicio</a></li>
                            <li><a href="experiencia.html" class="btn-custom">experiencia</a></li>
                            <li><a href="proyecto.html" class="btn-custom">proyecto</a></li>
                        </ul>
                    </nav>
    
            </div>
        </header>

        <!-- Contenido principal -->
        <main>
            <section class="proyectos">
                <h1>Proyectos</h1>

                <!-- Sistema de grillas de Bootstrap -->
                <!-- row: fila -->
                <!-- justify-content-center: centra columnas -->
                <!-- g-4: separación entre columnas -->
                <!-- mt-3: margen superior -->
            <div class="row justify-content-center g-4 mt-3">

                <!-- Columna responsive (3 columnas en pantallas medianas en adelante) -->
                    <div class="col-md-4">

                        <!-- Componente Card -->
                        <!-- h-100 hace que todas las cards tengan misma altura -->
                        <div class="card h-100">
                            <img src="../img/foto4.jpg" class="card-img-top" alt="Proyecto ecommerce">
                                <div class="card-body">
                                    <h5 class="card-title">Página de productos</h5>
                                    <p class="card-text">Sitio web ecommerce desarrollado con HTML y CSS.</p>
                                </div>
                        </div>
                    </div>
                    
                    <!-- Segunda columna -->
                    <div class="col-md-4">
                        <div class="card h-100">
                            <img src="../img/foto3.jpg" class="card-img-top" alt="Proyecto ecommerce">
                                <div class="card-body">
                                    <h5 class="card-title">App de gimnasio</h5>
                                    <p class="card-text">Aplicación para seguimiento de rutinas y progreso.</p>
                                </div>
                        </div>
                    </div>
                    
                    <!-- Tercera columna -->
                    <div class="col-md-4">
                        <div class="card h-100">
                            <img src="../img/foto2.jpg" class="card-img-top" alt="Proyecto ecommerce">
                                <div class="card-body">
                                    <h5 class="card-title">App de tareas</h5>
                                    <p class="card-text">Aplicación para organizar tareas diarias.</p>
                                </div>
                        </div>
                    </div>

                </div>
            </section>
        </main>

        <!-- Pie de pagina -->
        <footer>
            <p>Proyecto Academico 2026.</p>
        </footer>

    </div>

    <!-- Script de Bootstrap para habilitar componentes interactivos -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
